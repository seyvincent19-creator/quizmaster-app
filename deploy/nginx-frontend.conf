server {
    listen 80;
    server_name _;

    root /var/www/quizmaster/quizmaster-frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
